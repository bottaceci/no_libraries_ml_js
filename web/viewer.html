<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, maximum-scale=0.9, user-scalable=0">
        <meta charset="UTF-8">
        <title>Data Viewer</title>
        <link rel="stylesheet" href="styles.css"/>
    </head>
    <body>
        <h1>Data Viewer</h1>
        <div id="chartContainers">
            <div id="chartContainer"></div>
            <div id="chartContainer2"></div>
        </div>
        <div id="container"></div>
        <script src="../common/js_objects/features.js"></script>
        <script src="../common/constants.js"></script>
        <script src="../common/utils.js"></script>
        <script src="js/display.js"></script>
        <script src="./chart/chart.js"></script>
        <script src="./chart/graphics.js"></script>
        <script src="./chart/math.js"></script>

        <script>
            const {samples, featureNames} = features;
            const groups = utils.groupBy(samples, "student_id");
            
            for (let student_id in groups) {
                const samples = groups[student_id];
                const studentName = samples[0].student_name;
                createRow(container, studentName, samples);
            }

            const options = {
                size: 400,
                styles:utils.styles,
                transparency:0.7,
                icon:'image'
            };
            const options_1 = {
                ...options,
                pointIndices: [0,1],
                axesLabels:[featureNames[0], featureNames[1]],
            }
            const options_2 = {
                ...options,
                pointIndices: [2,3],
                axesLabels:[featureNames[2], featureNames[3]],
            }
            graphics.generateImages(utils.styles);

            const chart = new Chart(
                chartContainer,
                samples,
                options_1,
                handleClick
            );

            const chart2 = new Chart(
                chartContainer2,
                samples,
                options_2,
                handleClick
            );
        </script>
    </body>
</html>
